<div id="window-bar">
    <select id="window-selector">
        <option value="all">All windows</option>
    </select>
    <span id="tab-count"></span>
</div>

<div id="toolbar">
    <div class="toolbar-search">
        <input type="text" id="search-web" placeholder="Search website title..." />
    </div>

    <div class="toolbar-actions">
        <button id="open-add-group-modal" class="btn toolbar-btn" tooltip="New Group">
            <i class="fa-solid fa-folder-plus"></i>
        </button>
        <button id="toggle-view-mode" class="btn toolbar-btn" tooltip="Layout">
            <i class="fa-solid fa-eye"></i>
        </button>
        <button id="delete-all-groups" class="btn toolbar-btn" tooltip="Ungroup All">
            <i class="fa-solid fa-dumpster"></i>
        </button>
        <button id="remove-duplicate-tabs" class="btn toolbar-btn" tooltip="Clean Duplicates">
            <i class="fa-solid fa-clone"></i>
        </button>
    </div>
</div>

<div class="groups-container"></div>

<div id="edit-group-modal" class="modal hidden">
    <div class="modal-box">
        <h3 class="modal-title">Group Settings</h3>
        <input type="text" id="edit-group-name" placeholder="Group name..." />
        <div class="color-list">
            <span data-color="grey" tooltip="Grey"></span>
            <span data-color="blue" tooltip="Blue"></span>
            <span data-color="red" tooltip="Red"></span>
            <span data-color="yellow" tooltip="Yellow"></span>
            <span data-color="green" tooltip="Green"></span>
            <span data-color="pink" tooltip="Pink"></span>
            <span data-color="purple" tooltip="Purple"></span>
            <span data-color="cyan" tooltip="Cyan"></span>
        </div>
        <div class="modal-buttons">
            <button id="edit-group-save" class="primary">Save Changes</button>
            <button id="edit-group-cancel">Cancel</button>
        </div>
    </div>
</div>
