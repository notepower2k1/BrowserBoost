<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Water Reminder Settings</title>
    <link rel="stylesheet" href="water-settings.css">
</head>

<body>
    <!-- features/water-reminder/water-settings.html -->
    <div class="settings-root">
        <div class="card">
            <div class="row">
                <label>Daily Goal (ml)</label>
                <input id="dailyGoal" type="number" min="200" />
            </div>
            <div class="row">
                <label>Every minutes</label>
                <input id="interval-minutes" type="number" min="5" value="60" />
            </div>
        </div>

        <button id="save-settings" class="btn-primary" style="margin-top:12px;">Save Reminder Settings</button>
        <script type="module" src="water-settings.js"></script>
    </div>
</body>

</html>
