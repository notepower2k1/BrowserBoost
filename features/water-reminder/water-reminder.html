<!-- features/water-reminder/water-reminder.html -->
<div class="water-root">
    <div class="water-top">
        <div class="cup-wrap" id="cupWrap">
            <!-- SVG cup with fill -->
            <svg viewBox="0 0 200 260" class="cup-svg" id="cupSvg" aria-hidden="true">
                <defs>
                    <linearGradient id="gradA" x1="0" x2="0" y1="0" y2="1">
                        <stop offset="0%" stop-color="#7DD2FF" />
                        <stop offset="100%" stop-color="#3B9DFF" />
                    </linearGradient>
                    <linearGradient id="cupOutlineGrad" x1="0" x2="0" y1="0" y2="1">
                        <stop offset="0%" stop-color="#e3e6eb" />
                        <stop offset="100%" stop-color="#d3d6db" />
                    </linearGradient>
                    <filter id="wobble" x="-50%" y="-50%" width="200%" height="200%">
                        <feTurbulence baseFrequency="0.02" numOctaves="2" result="t" />
                        <feDisplacementMap in="SourceGraphic" in2="t" scale="3" xChannelSelector="R"
                            yChannelSelector="G" />
                    </filter>
                </defs>

                <!-- cup outline -->
                <g transform="translate(0,10)">
                    <path class="cup-outline"
                        d="M40 20 Q35 10 40 6 L160 6 Q165 10 160 20 L150 220 Q150 240 120 240 L80 240 Q50 240 50 220 Z"
                        fill="none" stroke="url(#cupOutlineGrad)" stroke-width="4" stroke-linejoin="round" />
                    <!-- water mask -->
                    <clipPath id="cupClip">
                        <path
                            d="M44 26 Q40 16 44 10 L156 10 Q160 16 156 26 L146 216 Q146 236 120 236 L80 236 Q54 236 54 216 Z" />
                    </clipPath>

                    <!-- water rectangle controlled by JS -->
                    <g clip-path="url(#cupClip)">
                        <rect id="waterRect" x="44" y="50" width="112" height="200" fill="url(#gradA)"
                            filter="url(#wobble)" />
                        <!-- optional wave -->
                        <path id="waterWave" d="" fill="#ffffff" fill-opacity="0.08" />
                    </g>
                </g>
            </svg>

            <div class="cup-overlay">
                <div class="percentage" id="cupPercentage">0%</div>
                <div class="ml-text" id="cupMlText">0 / 2000 ml</div>
            </div>
        </div>
    </div>

    <div class="quick-add">
        <button class="quick-btn" data-amount="100">+100</button>
        <button class="quick-btn" data-amount="250">+250</button>
        <button class="quick-btn" data-amount="500">+500</button>
    </div>

    <div class="stats-row">
        <div class="streak-box">
            <div class="label">🔥 Streak</div>
            <div class="value" id="streakCount">0 days</div>
        </div>

        <div class="goal-box">
            <div class="label">Today's Goal</div>
            <div class="value" id="todayStatus">In Progress</div>
        </div>
    </div>

    <div class="controls-row">
        <button id="openSettings" class="settings-btn" title="Settings">
            <i class="fa-solid fa-gear"></i> Settings
        </button>
        <button id="resetToday" class="reset-btn" title="Reset today's intake">Reset</button>
        <!-- ON/OFF -->
        <div class="reminder-row">
            <span>Reminder</span>
            <label class="switch">
                <input type="checkbox" id="reminder-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>
