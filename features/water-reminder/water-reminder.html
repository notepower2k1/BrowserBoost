<div class="water-reminder-box">
    <h3>Nhắc nhở uống nước</h3>

    <label>Cân nặng (kg)</label>
    <input id="weight" type="number" />

    <button id="calc-goal">Tính lượng nước cần uống</button>

    <label>Goal (ml)</label>
    <input id="custom-goal" type="number" />

    <label>Nhắc mỗi (phút)</label>
    <input id="interval" type="number" value="60" />

    <button id="start-reminder">Bật nhắc nhở</button>
</div>
