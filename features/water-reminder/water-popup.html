<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Water Reminder</title>
    <link rel="stylesheet" href="water-popup.css" />
</head>

<body>
    <div class="water-popup">
        <!-- Header -->
        <div class="header">
            <div class="header-img-wrap">
                <img src="../../assets/media/water.png" alt="Drink Water" class="header-img" />
            </div>
            <h1 class="header-text">Hydration Time</h1>
            <p class="header-desc">Stay fresh, drink some water!</p>
        </div>

        <div class="focus-wrap">
            <div class="actions">
                <button class="quick-btn" data-amount="100">Drink 100ml</button>
                <button class="quick-btn" data-amount="250">Drink 250ml</button>
                <button class="quick-btn" data-amount="500">Drink 500ml</button>
            </div>
        </div>
    </div>

    <script type="module" src="water-popup.js"></script>
</body>

</html>
