<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Water Reminder</title>
    <link rel="stylesheet" href="water-popup.css" />
</head>

<body>
    <div class="water-popup">
        <!-- Header -->
        <div class="header">
            <img src="../../assets/media/water.png" alt="Drink Water" class="header-img" />
            <div class="header-text">Take a sip 💧</div>
        </div>

        <div class="focus-wrap">
            <div class="actions">
                <button class="quick-btn" data-amount="100">+100</button>
                <button class="quick-btn" data-amount="250">+250</button>
                <button class="quick-btn" data-amount="500">+500</button>
            </div>
        </div>

    </div>

    <script type="module" src="water-popup.js"></script>
</body>

</html>
