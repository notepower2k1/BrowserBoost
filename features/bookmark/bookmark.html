<div id="folder-bar">
    <select id="bookmark-folder-select">
    </select>
    <span id="folder-count"></span>
</div>

<div id="bookmark-list" class="grid"></div>

<div id="toolbar">
    <div class="toolbar-search">
        <input type="text" id="search-input" placeholder="Search website title..." />
    </div>

    <div class="toolbar-actions">
        <button id="more-action" class="btn toolbar-btn" tooltip="More action">
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
        <button id="open-add-folder-modal" class="btn toolbar-btn" tooltip="Add folder">
            <i class="fa-solid fa-folder-plus"></i>
        </button>
        <button id="open-rename-folder-modal" class="btn toolbar-btn" tooltip="Rename folder">
            <i class="fa-solid fa-pen"></i>
        </button>
        <button id="delete-multiple-web" class="btn toolbar-btn" tooltip="Delete multiple web">
            <i class="fa-solid fa-dumpster"></i>
        </button>
        <button id="toggle-view" class="btn toolbar-btn" tooltip="Toggle view mode">
            <i class="fa-solid fa-eye"></i>
        </button>
    </div>
</div>

<!-- Modal rename folder -->
<div id="rename-modal" class="modal hidden">
    <div class="modal-box">
        <select id="folder-select"></select>
        <input id="new-folder-name-input" type="text" placeholder="New folder name" />
        <div class="modal-buttons">
            <button id="confirm-rename" class="btn add">
                <i class="fa-solid fa-add"></i>
            </button>
            <button id="cancel-rename" class="btn delete">
                <i class="fa-solid fa-x"></i>
            </button>
        </div>
    </div>
</div>

<!-- Modal add folder -->
<div id="add-folder-modal" class="modal hidden">
    <div class="modal-box">
        <input id="new-folder-name" type="text" placeholder="Folder name..." />
        <div class="modal-buttons">
            <button id="confirm-add-folder" class="btn add">
                <i class="fa-solid fa-plus"></i>
            </button>
            <button id="cancel-add-folder" class="btn delete">
                <i class="fa-solid fa-x"></i>
            </button>
        </div>
    </div>
</div>

<div id="folder-action-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-buttons">
            <button id="open-all-tabs" class="btn add">Open All</button>
            <button id="open-all-new-window" class="btn add">Open All in new window</button>
            <button id="open-incognito" class="btn add">Open All in incognito window</button>
            <button id="delete-folder" class="btn delete">Delete Folder</button>
            <button id="close-modal" class="btn delete">Cancel</button>
        </div>
    </div>
</div>

<div id="website-action-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-buttons">
            <button id="open-tab" class="btn add">Open in new tab</button>
            <button id="open-window" class="btn add">Open in new window</button>
            <button id="open-incognito" class="btn add">Open in incognito window</button>
            <button id="delete-website" class="btn delete">Delete Website</button>
            <button id="close-website-modal" class="btn delete">Cancel</button>
        </div>
    </div>
</div>
