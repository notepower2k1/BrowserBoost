<!-- Reminder Mode (replace current Reminder block) -->
<h3>Reminder Mode</h3>
<div class="card">
    <!-- ON/OFF -->
    <div class="reminder-row">
        <span>Reminder</span>
        <label class="switch">
            <input type="checkbox" id="er-enabled">
            <span class="slider"></span>
        </label>
    </div>

    <div class="row">
        <label>Relax every</label>
        <input type="number" id="er-interval" min="1" /> minutes
    </div>
</div>
    <button id="er-save" class="btn-primary">Save</button>
