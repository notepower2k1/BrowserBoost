<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sidebar Note</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="note-sidebar.css">
</head>

<body>
    <!-- Note Header -->
    <header id="note-header">
        <div class="header-main">
            <div class="note-brand">
                <i class="fa-solid fa-feather-pointed"></i>
                <span>Notes</span>
            </div>
            <div class="header-actions">
                <button id="add-note" class="icon-btn primary" title="Add new note">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <div class="select-wrapper">
                    <select id="note-selector"></select>
                </div>
                <button id="delete-note" class="icon-btn danger" title="Delete current note">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </div>

        <div class="header-secondary">
            <button id="sticky-note" class="btn-text" title="Extract text to sticky note">
                <i class="fa-solid fa-note-sticky"></i> Sticky
            </button>
            <div class="divider"></div>
            <button id="toggle-dark" class="btn-text" title="Toggle Theme">
                <i class="fa-solid fa-circle-half-stroke"></i> Theme
            </button>
        </div>
    </header>

    <!-- Note Toolbar -->
    <div id="note-toolbar">
        <div class="toolbar-group">
            <button data-cmd="bold" title="Bold"><i class="fa-solid fa-bold"></i></button>
            <button data-cmd="italic" title="Italic"><i class="fa-solid fa-italic"></i></button>
            <button data-cmd="underline" title="Underline"><i class="fa-solid fa-underline"></i></button>
            <button data-cmd="strikeThrough" title="Strike"><i class="fa-solid fa-strikethrough"></i></button>
        </div>

        <div class="toolbar-group">
            <button data-cmd="justifyLeft" title="Align Left"><i class="fa-solid fa-align-left"></i></button>
            <button data-cmd="justifyCenter" title="Align Center"><i class="fa-solid fa-align-center"></i></button>
            <button data-cmd="justifyRight" title="Align Right"><i class="fa-solid fa-align-right"></i></button>
        </div>

        <div class="toolbar-group">
            <button data-cmd="insertUnorderedList" title="Bullet List"><i class="fa-solid fa-list-ul"></i></button>
            <button data-cmd="insertOrderedList" title="Numbered List"><i class="fa-solid fa-list-ol"></i></button>
        </div>

        <div class="toolbar-group">
            <button data-cmd="createLink" data-prompt="Enter URL:" title="Insert Link"><i
                    class="fa-solid fa-link"></i></button>
            <button data-cmd="insertImage" data-prompt="Enter Image URL:" title="Insert Image"><i
                    class="fa-solid fa-image"></i></button>
        </div>

        <div class="toolbar-group">
            <button data-cmd="removeFormat" title="Clear Style"><i class="fa-solid fa-eraser"></i></button>
            <button data-cmd="undo" title="Undo"><i class="fa-solid fa-rotate-left"></i></button>
            <button data-cmd="redo" title="Redo"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <!-- Note Body -->
    <main id="note-body" contenteditable="true" spellcheck="false" placeholder="Start typing your note here..."></main>

    <!-- Note Footer -->
    <footer id="note-footer">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-text" placeholder="Search in note...">
            <button id="btn-search">Find</button>
        </div>
        <button id="copy-note" class="btn-primary">
            <i class="fa-solid fa-copy"></i> Copy All
        </button>
    </footer>

    <script type="module" src="note-sidebar.js"></script>
</body>

</html>
