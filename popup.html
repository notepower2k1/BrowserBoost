<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="features/bookmark/bookmark.css">
    <link rel="stylesheet" href="features/tab/tab.css">
    <link rel="stylesheet" href="features/clipboard/clipboard.css">
    <link rel="stylesheet" href="features/calendar/calendar.css">
    <title>Helper Browser Tool</title>
</head>

<body>
    <div id="support-btn">
        <div class="logo-container" id="donate-btn" data-tooltip="Support my work">
            <img src="assets/media/logo.png" alt="Logo" class="extension-logo">
            <span class="extension-title">Browser Boost</span>
        </div>
        <div class="actions">
            <button class="btn" id="openNoteBtn" data-tooltip="Open sidebar Note">
                <i class="fa-solid fa-book-open"></i>
            </button>
            <button class="btn" id="openRecorderBtn" data-tooltip="Screen Recorder">
                <i class="fa-solid fa-record-vinyl"></i>
            </button>
            <button class="btn" id="addStickyBtn" data-tooltip="Sticky Note">
                <i class="fa-solid fa-note-sticky"></i>
            </button>
            <button class="btn" id="openColorPickerBtn" data-tooltip="Color Picker">
                <i class="fa-solid fa-palette"></i>
            </button>
        </div>
    </div>
    <div id="tab-bar">
        <button class="tab-btn" data-tab="tabmanager" data-tooltip="Manage your open tabs and groups">
            <i class="fa-solid fa-folder-open"></i>
            <span>Tabs</span>
        </button>
        <button class="tab-btn" data-tab="bookmark" data-tooltip="Quickly access and organize bookmarks">
            <i class="fa-solid fa-bookmark"></i>
            <span>Bookmarks</span>
        </button>
        <button class="tab-btn" data-tab="water" data-tooltip="Track your daily water intake">
            <i class="fa-solid fa-droplet"></i>
            <span>Water</span>
        </button>
        <button class="tab-btn" data-tab="eye-relax" data-tooltip="Manage eye rest and relaxation intervals">
            <i class="fa-solid fa-eye"></i>
            <span>Relax</span>
        </button>
        <button class="tab-btn" data-tab="clipboard" data-tooltip="View and manage your clipboard history">
            <i class="fa-solid fa-paste"></i>
            <span>Clipboard</span>
        </button>
        <button class="tab-btn" data-tab="quick-command" data-tooltip="Manage quick commands">
            <i class="fa-solid fa-terminal"></i>
            <span>Cmds</span>
        </button>
        <button class="tab-btn" data-tab="calendar" data-tooltip="Vietnamese Lunar Calendar">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Calendar</span>
        </button>
    </div>
    <div id="tab-contents">
        <div class="tab-content" id="tabmanager-container">
        </div>
        <div class="tab-content hidden" id="bookmark-container">
        </div>
        <div class="tab-content hidden" id="water-container">
        </div>
        <div class="tab-content hidden" id="eye-relax-container">
        </div>
        <div class="tab-content hidden" id="clipboard-container">
        </div>
        <div class="tab-content hidden" id="quick-command-container">
        </div>
        <div class="tab-content hidden" id="calendar-container">
        </div>
    </div>

    <!-- CHỈ CẦN 1 SCRIPT MODULE -->
    <script type="module" src="popup.js"></script>
</body>

</html>
