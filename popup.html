<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="features/bookmark/bookmark.css">
    <link rel="stylesheet" href="features/tab/tab.css">
    <title>Helper Browser Tool</title>
</head>

<body>
    <div id="support-btn">
        <button class="btn" id="openNoteBtn" title="Mở Note">
            <i class="fa-solid fa-book-open"></i>
        </button>
        <button class="btn" id="openRecorderBtn" title="Quay màn hình">
            <i class="fa-solid fa-record-vinyl"></i>
        </button>
        <button class="btn" id="addStickyBtn" title="Thêm Sticky Note">
            <i class="fa-solid fa-note-sticky"></i>
        </button>
    </div>
    <hr>
    <div id="tab-bar">
        <button class="tab-btn" data-tab="tabmanager">
            <i class="fa-solid fa-folder-open"></i>
            <span>Tab</span>
        </button>
        <button class="tab-btn" data-tab="bookmark">
            <i class="fa-solid fa-bookmark"></i>
            <span>Bookmark</span>
        </button>
        <button class="tab-btn" data-tab="water">
            <i class="fa-solid fa-droplet"></i>
            <span>Water</span>
        </button>
        <button class="tab-btn" data-tab="eye-relax">
            <i class="fa-solid fa-eye"></i>
            <span>Relax</span>
        </button>
    </div>
    <div id="tab-contents">
        <div class="tab-content" id="tabmanager-container">
        </div>
        <div class="tab-content hidden" id="bookmark-container">
        </div>
        <div class="tab-content hidden" id="water-container">
        </div>
        <div class="tab-content hidden" id="eye-relax-container">
        </div>
    </div>

    <!-- CHỈ CẦN 1 SCRIPT MODULE -->
    <script type="module" src="popup.js"></script>
</body>

</html>
